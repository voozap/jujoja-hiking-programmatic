<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Trail... | jujoja.com</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #2d8b6e;
            --accent: #4a9c6d;
            --dark: #0d1b2a;
            --light: #f8f9fa;
            --text: #334155;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.6;
        }
        
        .navbar {
            background: var(--dark);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .article-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .article-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .article-meta {
            display: flex;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 2rem;
            color: #64748b;
            font-weight: 500;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">🏔️ jujoja.com</a>
        </div>
    </nav>

    <div class="article-container" id="articleBody">
        <a href="javascript:history.back()" class="back-btn">← Back to Search</a>
        <h1 class="article-title" id="title">Loading...</h1>
        <div class="article-meta" id="meta"></div>
        <div class="article-content" id="content">Fetching trail data...</div>
    </div>

    <script>
        // This script runs as soon as the page loads
        window.addEventListener('DOMContentLoaded', async () => {
            // 1. Grab the ID from the URL (e.g., ?id=trail-001)
            const urlParams = new URLSearchParams(window.location.search);
            const trailId = urlParams.get('id');
            
            if (trailId) {
                try {
                    // 2. Fetch the database n8n just built
                    const response = await fetch('/pages.json');
                    const data = await response.json();
                    
                    // 3. Find the exact trail the user clicked on
                    const trail = data.pages.find(p => p.id === trailId);
                    
                    if (trail) {
                        // 4. Update the SEO title tag
                        document.title = `${trail.title} | Hiking Guide`;
                        
                        // 5. Inject the AI-generated HTML directly into the page!
                        document.getElementById('articleBody').innerHTML = `
                            <a href="javascript:history.back()" class="back-btn">← Back to Search</a>
                            ${trail.content}
                            
                            <div class="article-meta" style="margin-top: 2rem; padding-top: 2rem; border-top: 2px solid #e2e8f0;">
                                <span>📍 ${trail.location || 'Unknown'}</span>
                                <span>🥾 ${trail.difficulty || 'N/A'}</span>
                                <span>📏 ${trail.length || 'Unknown'}</span>
                            </div>
                        `;
                    } else {
                        document.getElementById('articleBody').innerHTML = "<h1>Trail Not Found</h1><p>Our AI might still be generating this guide!</p>";
                    }
                } catch (error) {
                    console.error("Error loading article:", error);
                    document.getElementById('articleBody').innerHTML = "<h1>Connection Error</h1><p>Failed to load the trail database.</p>";
                }
            } else {
                // If there's no ID in the URL, send them back to the homepage
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
